<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QuizGen</title>
    <script type="text/javascript">
      // GitHub Pages SPA hack to handle non-root paths (like /history, /auth)
      // This redirect works in conjunction with the script in index.html
      var pathSegmentToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
