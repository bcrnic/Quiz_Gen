<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <title>QuizGen - AI Quiz Generator</title>
  <meta name="description"
    content="Upload your study material and generate AI-powered quizzes to test your knowledge" />

  <meta property="og:title" content="QuizGen - AI Quiz Generator" />

    content="Upload your study material and generate AI-powered quizzes to test your knowledge" />

  <meta property="og:image" content="/favicon.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@QuizGen" />
  <meta name="twitter:image" content="/favicon.png" />
  <script type="text/javascript">
    // GitHub Pages SPA hack
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
